<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>মেসেজ</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body { margin:0; font-family: Arial; background:#f5f5f5; }

.header {
    background:#007bff;
    color:white;
    padding:12px;
    display:flex;
    align-items:center;
}

.chat-box {
    height: calc(100vh - 120px);
    overflow-y:auto;
    padding:10px;
}

.msg {
    max-width:70%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
}

.me {
    background:#007bff;
    color:white;
    margin-left:auto;
}

.other {
    background:#e4e6eb;
}

.input-box {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:white;
    border-top:1px solid #ddd;
}

.input-box input {
    flex:1;
    padding:12px;
    border:none;
    outline:none;
}

.input-box button {
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="header">
    <i class="material-icons" onclick="history.back()">arrow_back</i>
    <span style="margin-left:10px;">চ্যাট</span>
</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-box">
    <input type="text" id="msgInput" placeholder="মেসেজ লিখুন...">
    <button onclick="sendMessage()">Send</button>
</div>

<script src="messages.js"></script>
</body>
</html>

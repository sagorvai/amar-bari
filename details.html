<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>প্রপার্টি বিস্তারিত</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body { font-family: system-ui; margin:0; background:#f6f7f9; }
    .container { max-width:1100px; margin:auto; padding:15px; }
    h2 { margin-top:30px; border-left:4px solid #0a7cff; padding-left:10px; }

    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
    .box { background:#fff; padding:12px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,.05); }
    .label { font-size:13px; color:#777; }
    .value { font-weight:600; margin-top:3px; }

    .gallery img { width:100%; border-radius:10px; }
    .thumbs { display:flex; gap:8px; margin-top:10px; }
    .thumbs img { width:70px; height:55px; object-fit:cover; cursor:pointer; border-radius:6px; }

    .price { font-size:22px; color:#0a7cff; font-weight:bold; }

    .sidebar {
      position:sticky; top:10px;
      background:#fff; padding:15px;
      border-radius:10px;
      box-shadow:0 2px 5px rgba(0,0,0,.08);
    }

    .btn {
      display:block; text-align:center; margin-top:10px;
      padding:10px; border-radius:6px;
      text-decoration:none; color:#fff;
    }
    .call { background:#28a745; }
    .wa { background:#25D366; }

    details summary { cursor:pointer; font-weight:600; }
  </style>
</head>
<body>

<div class="container">

  <!-- IMAGE + HEADER -->
  <div class="gallery">
    <img id="displayImg" />
    <div class="thumbs" id="thumbList"></div>
  </div>

  <h1 id="title"></h1>
  <p id="shortLocation"></p>
  <div class="price" id="price"></div>

  <!-- MAIN GRID -->
  <div style="display:grid; grid-template-columns:3fr 1fr; gap:20px;">

    <!-- LEFT -->
    <div>

      <h2>প্রপার্টির সারসংক্ষেপ</h2>
      <div id="overview" class="grid"></div>

      <h2>মূল্য ও শর্ত</h2>
      <div id="priceTerms" class="grid"></div>

      <h2>অবস্থান ও ঠিকানা</h2>
      <div id="locationInfo" class="grid"></div>

      <h2>ভৌত বিবরণ</h2>
      <div id="physicalDetails" class="grid"></div>

      <details id="legalSection">
        <summary>মালিকানা ও আইনগত তথ্য</summary>
        <div id="ownership" class="grid" style="margin-top:15px;"></div>
      </details>

      <h2>বিস্তারিত বর্ণনা</h2>
      <p id="description"></p>

    </div>

    <!-- RIGHT -->
    <div class="sidebar">
      <h3 id="posterType"></h3>
      <p id="sellerName"></p>
      <a id="callBtn" class="btn call">📞 কল করুন</a>
      <a id="waBtn" class="btn wa">💬 WhatsApp</a>
    </div>

  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  // তোমার config
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script src="details.js"></script>
</body>
    </html>

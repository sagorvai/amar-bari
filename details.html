<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রপার্টি ডিটেইলস - আমার বাড়ি.কম</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        .details-container { max-width: 900px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .post-title { font-size: 28px; color: #2c3e50; margin-bottom: 10px; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; }
        .post-desc { font-size: 16px; line-height: 1.6; color: #555; margin-bottom: 25px; white-space: pre-line; }
        
        /* গ্যালারি স্টাইল (৫টি ছবি) */
        .image-gallery { display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(2, 150px); gap: 10px; margin-bottom: 30px; }
        .main-img { grid-column: span 4; grid-row: span 2; width: 100%; height: 100%; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .sub-img { grid-column: span 2; width: 100%; height: 100%; object-fit: cover; border-radius: 8px; cursor: pointer; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .info-section { background: #f9f9f9; padding: 15px; border-radius: 8px; border-left: 5px solid #3498db; }
        .info-section h3 { margin-top: 0; font-size: 18px; color: #34495e; }
        
        .contact-box { background: #e8fcf1; padding: 20px; border-radius: 12px; margin-top: 30px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; }
        .btn-call { background: #2ecc71; color: white; padding: 12px 25px; border-radius: 30px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .btn-message { background: #3498db; color: white; padding: 12px 25px; border-radius: 30px; display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; }

        .related-posts { margin-top: 50px; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <main class="main-content container">
        <div class="details-container">
            <h1 id="det-title" class="post-title">লোড হচ্ছে...</h1>
            
            <div id="det-desc" class="post-desc">প্রপার্টির বিস্তারিত বিবরণ এখানে থাকবে...</div>

            <div class="image-gallery" id="det-gallery">
                </div>

            <div id="det-info" class="info-grid">
                </div>

            <div class="contact-box">
                <a href="#" id="call-link" class="btn-call"><i class="material-icons">call</i> সরাসরি ফোন করুন</a>
                <div id="msg-link" class="btn-message"><i class="material-icons">chat</i> সাইট মেসেজ</div>
            </div>
        </div>

        <div class="related-posts">
            <h3>সম্পর্কিত আরও কিছু পোস্ট</h3>
            <div id="related-grid" class="related-grid">
                </div>
        </div>
    </main>

    <script src="details.js"></script>
</body>
</html>

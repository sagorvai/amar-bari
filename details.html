<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রপার্টি ডিটেইলস - আমার বাড়ি.কম</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        .details-wrapper { max-width: 1000px; margin: 20px auto; padding: 15px; }
        .post-header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .post-title { font-size: 24px; color: #2c3e50; margin: 0 0 10px 0; }
        .price-tag { font-size: 22px; color: #2ecc71; font-weight: bold; }
        
        /* ইমেজ গ্যালারি গ্রিড */
        .image-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .main-img-box { grid-column: span 4; height: 350px; cursor: pointer; }
        .thumb-img-box { height: 100px; cursor: pointer; }
        .img-fit { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; transition: 0.3s; }
        .img-fit:hover { opacity: 0.8; }

        /* ইনফো টেবিল */
        .info-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .info-table td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        .info-table td:first-child { font-weight: bold; color: #7f8c8d; width: 40%; }

        /* অ্যাকশন বাটন */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-action { flex: 1; padding: 12px; border: none; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; font-weight: bold; }
        .btn-save { background: #f1c40f; color: #333; }
        .btn-share { background: #34495e; color: white; }
        .btn-call { background: #2ecc71; color: white; text-decoration: none; }
        .btn-map { background: #e74c3c; color: white; text-decoration: none; }

        /* Lightbox Modal */
        .lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .lightbox-img { max-width: 90%; max-height: 80%; border-radius: 5px; }
        .close-lb { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="details-wrapper">
        <div class="post-header">
            <h1 id="det-title" class="post-title">লোড হচ্ছে...</h1>
            <p class="price-tag" id="det-price"></p>
            <p id="det-desc" style="white-space: pre-line; color: #555;"></p>
        </div>

        <div class="image-container" id="image-grid">
            </div>

        <div class="action-bar">
            <a href="#" id="call-btn" class="btn-action btn-call"><i class="material-icons">call</i> কল করুন</a>
            <button class="btn-action btn-save" id="save-btn"><i class="material-icons">bookmark_border</i> সেভ</button>
            <button class="btn-action btn-share" id="share-btn"><i class="material-icons">share</i> শেয়ার</button>
        </div>

        <h3>প্রপার্টি ইনফরমেশন</h3>
        <table class="info-table" id="details-table">
            </table>

        <div id="map-area" style="margin-top: 20px;">
            <a href="#" id="google-map-link" target="_blank" class="btn-action btn-map">
                <i class="material-icons">location_on</i> গুগোল ম্যাপে লোকেশন দেখুন
            </a>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close-lb" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-img" id="lb-img">
    </div>

    <script src="details.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রপার্টি ডিটেইলস - আমার বাড়ি.কম</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #2c3e50; --gray: #7f8c8d; --bg: #f4f7f6; }
        body { background-color: var(--bg); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        
        .top-bar { display: flex; align-items: center; gap: 10px; padding: 10px 0; margin-bottom: 15px; background: white; position: sticky; top: 0; z-index: 100; padding: 10px 15px; border-bottom: 1px solid #ddd; margin-left: -15px; margin-right: -15px; }
        .back-btn { background: none; border: none; cursor: pointer; color: var(--dark); }
        .top-title { font-size: 18px; font-weight: bold; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .p-slider { position: relative; width: 100%; height: 250px; background: #eee; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
        .p-slider img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .slider-counter { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 3px 10px; border-radius: 20px; font-size: 12px; }

        .price-tag { font-size: 22px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .action-bar { display: flex; gap: 10px; margin: 20px 0; }
        .btn-act { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; background: white; border: 1px solid #ddd; }

        .section-header { font-size: 16px; font-weight: bold; margin: 20px 0 10px; padding-bottom: 5px; border-bottom: 2px solid var(--primary); color: var(--dark); }
        .info-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .info-table td:first-child { color: var(--gray); width: 40%; }
        .info-table td:last-child { font-weight: 500; text-align: right; }

        .btn-map { display: block; width: 100%; text-align: center; padding: 12px; background: #fff; color: var(--primary); text-decoration: none; border: 1px solid var(--primary); border-radius: 8px; margin-top: 10px; font-weight: bold; }

        .related-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .related-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .related-card img { width: 100%; height: 100px; object-fit: cover; }
        .related-info { padding: 8px; }
        .related-title { font-size: 13px; font-weight: bold; height: 36px; overflow: hidden; }
        .related-price { color: var(--primary); font-size: 12px; margin-top: 5px; }

        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 95%; max-height: 90%; border-radius: 8px; }

        /* --- নতুন মডাল ও বাটন স্টাইল --- */
        .btn-verify { width: 100%; background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; font-weight: bold; font-size: 15px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: flex-end; }
        .modal-content { width: 100%; height: 92%; background: white; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { background: #1b5e20; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .modal-info { display: flex; flex-wrap: wrap; gap: 5px; line-height: 1.4; }
        .close-modal { font-size: 28px; cursor: pointer; font-weight: bold; line-height: 1; }
        #land-iframe { flex: 1; width: 100%; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button class="back-btn" onclick="history.back()"><i class="material-icons">arrow_back</i></button>
            <div class="top-title" id="p-title-top">লোডিং...</div>
            <i class="material-icons">more_vert</i>
        </div>

        <div class="p-slider" id="p-slider">
            <div class="slider-counter" id="slider-count">0/0</div>
        </div>

        <h1 id="p-title" style="font-size: 20px; margin: 15px 0 5px;"></h1>
        <div class="price-tag" id="p-price"></div>
        <p id="p-desc" style="color: #555; line-height: 1.6; font-size: 14px;"></p>

        <div class="action-bar">
            <button class="btn-act" id="p-save"><i class="material-icons">bookmark_border</i> সেভ</button>
            <button class="btn-act" id="p-share"><i class="material-icons">share</i> শেয়ার</button>
        </div>

        <div class="section-header">🏠 প্রপার্টির তথ্য</div>
        <table class="info-table" id="table-basic"></table>

        <div id="section-owner" style="display:none;">
            <div class="section-header">📑 মালিকানা তথ্য</div>
            <table class="info-table" id="table-owner"></table>
            <button id="btn-verify-khotian" class="btn-verify">
                <i class="material-icons">verified_user</i> খতিয়ান যাচাই করুন
            </button>
        </div>

        <div class="section-header">📍 অবস্থান</div>
        <table class="info-table" id="table-location"></table>
        <a href="#" id="p-map" target="_blank" class="btn-map" style="display:none;"><i class="material-icons">map</i> ম্যাপে দেখুন</a>

        <div class="section-header">📞 যোগাযোগ</div>
        <table class="info-table" id="table-contact"></table>

        <div class="related-section">
            <h3 style="margin-top:30px;">সম্পর্কিত পোস্ট</h3>
            <div class="related-grid" id="related-list"></div>
            <div class="see-more-container" id="see-more-box" style="display:none;">
                <button class="btn-see-more" id="btn-see-more">See More...</button>
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lb-img"></div>

    <div id="land-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-info" id="modal-info-text"></div>
                <span class="close-modal" id="close-land-modal">&times;</span>
            </div>
            <iframe src="" id="land-iframe"></iframe>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 আমার বাড়ি.কম। সর্বস্বত্ব সংরক্ষিত।</p>
        </div>
    </footer>

    <script src="details.js"></script> 
</body>
                </html>

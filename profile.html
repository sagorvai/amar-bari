<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোফাইল ড্যাশবোর্ড - আমার বাড়ি.কম</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        /* প্রোফাইল স্পেসিফিক আধুনিক স্টাইল */
        .profile-header-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .profile-avatar-big { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #2ecc71; background: #eee; }
        
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid #2ecc71; }
        .stat-card h4 { margin: 5px 0; color: #7f8c8d; font-size: 14px; }
        .stat-card p { font-size: 22px; font-weight: bold; margin: 0; color: #2c3e50; }

        .profile-tabs { display: flex; gap: 10px; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 16px; font-weight: 600; color: #7f8c8d; transition: 0.3s; }
        .tab-btn.active { color: #2ecc71; border-bottom: 3px solid #2ecc71; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .edit-badge { background: #f1f2f6; padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; color: #2ecc71; display: inline-flex; align-items: center; gap: 5px; border: 1px solid #ddd; transition: 0.2s; }
        .edit-badge:hover { background: #e8fcf1; }

        /* সাধারণ পপ-আপ (Modal) স্টাইল */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); overflow-y: auto; backdrop-filter: blur(3px); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; width: 90%; max-width: 500px; border-radius: 15px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: slideIn 0.3sEase; }
        @keyframes slideIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #aaa; transition: 0.2s; }
        .close-modal:hover { color: #e74c3c; }

        /* ফর্ম স্টাইল */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
        .input-group input[type="text"], .input-group input[type="tel"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .submit-button { background: #2ecc71; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; transition: 0.2s; }
        .submit-button:hover { background: #27ae60; }
        .submit-button:disabled { background: #bdc3c7; cursor: not-allowed; }
    </style>
</head>
<body>
    <main class="main-content container">
        <div class="profile-header-card">
            <img src="default-avatar.png" id="user-avatar" class="profile-avatar-big" alt="User Avatar">
            <div class="user-info">
                <h2 id="display-name" style="margin:0;">লোড হচ্ছে...</h2>
                <p id="user-email" style="color: #7f8c8d; margin: 5px 0;"></p>
                <div class="edit-badge" id="edit-profile-show-btn">
                    <i class="material-icons" style="font-size: 16px;">edit</i> প্রোফাইল এডিট করুন
                </div>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <h4>আমার পোস্ট</h4>
                <p id="total-posts-count">০</p>
            </div>
            <div class="stat-card">
                <h4>সেভ করা</h4>
                <p id="saved-posts-count">০</p>
            </div>
            <div class="stat-card">
                <h4>ভেরিফিকেশন</h4>
                <p id="verification-status" style="font-size: 14px; color: #e67e22;">Pending</p>
            </div>
        </div>

        <div class="profile-tabs">
            <button class="tab-btn active" onclick="openTab(event, 'my-posts')">আমার লিস্টিং</button>
            <button class="tab-btn" onclick="openTab(event, 'saved-posts')">পছন্দের তালিকা</button>
        </div>

        <div id="my-posts" class="tab-content active">
            <div id="my-properties-list" class="property-grid"></div>
            <p id="empty-posts-message" style="display:none; text-align:center; padding: 40px; color: #95a5a6;">আপনি এখনও কোনো পোস্ট করেননি।</p>
        </div>

        <div id="saved-posts" class="tab-content">
            <div id="saved-properties-list" class="property-grid"></div>
            <p style="text-align:center; padding: 40px; color: #95a5a6;">আপনার পছন্দের কোনো প্রপার্টি সেভ করা নেই।</p>
        </div>
    </main>

    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="edit-profile-close-btn">&times;</span>
            <h3 style="margin-top: 0; text-align: center;">প্রোফাইল আপডেট করুন</h3>
            
            <div style="text-align: center; margin-bottom: 20px; position: relative; display: inline-block; width: 100%;">
                <img src="default-avatar.png" id="edit-avatar-preview" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #2ecc71;">
                <label for="edit-profile-picture" style="position: absolute; bottom: 0; right: calc(50% - 60px); background: #34495e; color: white; padding: 5px; border-radius: 50%; cursor: pointer;">
                    <i class="material-icons">photo_camera</i>
                </label>
            </div>

            <form id="edit-profile-form">
                <input type="file" id="edit-profile-picture" accept="image/png, image/jpeg" style="display: none;">
                
                <div class="input-group">
                    <label>পুরো নাম:</label>
                    <input type="text" id="edit-full-name" placeholder="আপনার নাম লিখুন" required>
                </div>
                
                <div class="input-group">
                    <label>ফোন নম্বর (ঐচ্ছিক):</label>
                    <input type="tel" id="edit-phone-number" placeholder="০১৮XXXXXXXX">
                </div>
                
                <div style="margin-top: 25px;">
                    <button type="submit" class="submit-button" id="update-profile-btn">আপডেট সংরক্ষণ করুন</button>
                </div>
            </form>
        </div>
    </div>

    <div id="propertyModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-modal" onclick="closePropertyModal()">&times;</span>
            <div id="modal-content-inner">
                </div>
            <div style="display:flex; gap:10px; margin-top:20px; border-top:1px solid #ddd; padding-top:15px;">
                <button id="modal-delete-btn" style="background:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; flex:1; font-weight:bold;">ডিলিট করুন</button>
                <button id="modal-upgrade-btn" style="background:#3498db; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; flex:1; font-weight:bold;">আপগ্রেড / এডিট</button>
            </div>
        </div>
    </div>

    <script src="profile.js"></script>
    <script>
        // ট্যাব পরিবর্তনের সহজ ফাংশন
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) { tabcontent[i].classList.remove("active"); }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
